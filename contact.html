<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harley Security | Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
         <div class="brand">
    <img src="logo.JPG" alt="Harley Security Logo" class="nav-logo">
    <h2>Harley Security</h2>
</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="privacy.html">Web Privacy</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button id="theme-btn" onclick="toggleTheme()" class="btn btn-success btn-sm" style="background-color: #238636; border: none;">Enable Dark Mode</button>
    </nav>

    <div class="container mt-5" style="max-width: 600px; margin-bottom: 80px;">
        <h1 class="text-center mb-4" id="main-heading">Request a Security Consultation</h1>
        
        <div id="formMessage" style="display: none;"></div>

        <form id="contactForm" style="position: relative;">
            <div class="mb-3">
                <label for="name" class="form-label">Client / Company Name</label>
                <input type="text" class="form-control" id="name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Secure Contact Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Describe your security needs</label>
                <textarea class="form-control" id="message" rows="4" maxlength="500" required></textarea>
                <small id="charCount" style="color: #8b949e; float: right; margin-top: 5px;">0 / 500 characters</small>
            </div>
            <button type="submit" class="btn btn-dark w-100" style="background-color: #238636; border: none;">Submit Encrypted Request</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Harley Security. Securing the Web.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
